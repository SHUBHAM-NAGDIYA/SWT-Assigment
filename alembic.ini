# Alembic configuration file.
# The script_location points to the alembic/ directory at project root.
# sqlalchemy.url is intentionally left empty here; it is injected at
# runtime by alembic/env.py from the DATABASE_URL environment variable.

[alembic]
script_location = alembic
prepend_sys_path = .

# Leave blank – DATABASE_URL is loaded dynamically in env.py.
sqlalchemy.url =

[post_write_hooks]
# (none configured)

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
